<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left">
        <p>A</P>
        <p>♠</P>
      </div>
      <div class="middle">
        <p>♠</P>
      </div>
      <div class="right element-180">
        <p>A</P>
        <p>♠</P>
      </div>
    </div>

    <div class="card">
      <div class="left">
        <p>2</P>
        <p>♣</P>
      </div>
      <div class="middle">
        <p>♣</P>
        <p class="element-180">♣</P>
      </div>
      <div class="right element-180">
        <p>2</P>
        <p>♣</P>
      </div>

    </div><div class="card red-element">
      <div class="left">
        <p>3</P>
        <p>♥ </P>
      </div>
      <div class="middle">
        <p >♥ </P>
        <p>♥ </P>
        <p class="element-180">♥ </P>
      </div>
      <div class="right element-180">
        <p>3</P>
        <p>♥ </P>
      </div>

    </div><div class="card">
      <div class="left">
        <p>4</P>
        <p>♣</P>
      </div>
      <div class="middle four-simble">
        <p>♣</P>
        <p class="element-180">♣</P>
        <p>♣</P>
        <p class="element-180">♣</P>
      </div>
      <div class="right element-180">
        <p>4</P>
        <p>♣</P>
      </div>

    </div><div class="card red-element">
      <div class="left">
        <p>5</P>
        <p>♦</P>
      </div>

      <div class="middle five-simble">
        <div class="row">
          <p>♦</P>
          <p>♦</P>
          </div>

        <div class="row">
          <p class="middle-element">♦</P>
        </div>

        <div class="row">
          <p>♦</P>
          <p>♦</P>
        </div>
      </div>
      <div class="right element-180">
        <p>5</P>
        <p>♦</P>
      </div>
    </div>
  </main>
</body>

</html>
